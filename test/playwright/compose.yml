name: zealot-playwright

services:
  server:
    image: zealot-server:playwright
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    environment:
      DATABASE: sqlite
      # No volume mount — DB lives in the ephemeral container filesystem.
      # Each `compose down && compose up` starts with a fresh database.
      DB_FILENAME: /data/zealot.db
      MEDIA_SOURCE: FILESYSTEM
      MEDIA_PATH: /data/public
      PORT: "8456"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8456/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  web:
    image: zealot-web:playwright
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:18081:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
