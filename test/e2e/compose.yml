name: zealot-e2e

services:
  server:
    image: zealot-server:e2e
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    environment:
      DATABASE: sqlite
      DB_FILENAME: /data/zealot.db
      MEDIA_SOURCE: FILESYSTEM
      MEDIA_PATH: /data/public
      PORT: "8456"
    ports:
      - "127.0.0.1:18456:8456"
    volumes:
      - zealot_e2e_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8456/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  web:
    image: zealot-web:e2e
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:18080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  zealot_e2e_data:
